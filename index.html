<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>

    <link href="src/style.css" rel="stylesheet" type="text/css" />

    <title>Are You Kidding Me</title>
    
  </head>

  <body>

    <div class="top-bar">

      <h1>😂 Joke AI</h1>
    
      <div class="controls">
        
        <select id="category">
          <option value="funny">Random</option>
          <option value="dad">Dad Jokes</option>
          <option value="puns">Puns</option>
        </select>
    
        <button id="themeToggle">🌙</button>
      </div>
    
    </div>
  
      <!-- CHAT AREA -->
      <div id="chatbox">
        <div class="message bot">
          Hi 👋 Click “Send” to get a joke!
        </div>
      </div>
  
      <!-- INPUT AREA -->
      <div class="input-bar">
        <button id="clickjokebutton">Tell me joke</button>
        <button id="copyBtn">Copy</button>
      </div>
  
      <audio id="laugh-sound"
        src="https://www.soundjay.com/human/laugh-1.mp3"
        preload="auto"></audio>
  
    </div>
  
    <script src="src/index.js"></script>
  
  </body>
</html>
