<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>

    <link href="src/style.css" rel="stylesheet" type="text/css" />

    <link rel="manifest" href="manifest.json">

    <title>Are You Kidding Me</title>
    
  </head>

  <body>

      <div class="chat-app">
    
        <!-- TOP BAR -->
        <div class="top-bar">
    
          <h1> Are you kidding me?</h1>
    
          <div class="controls">
            <label class="toggle">
              <input type="checkbox" id="kidMode" checked />
              <span>👶 Kid Mode</span>
            </label>
    
            <button id="themeToggle">🌙</button>
          </div>
    
        </div>
    
        <!-- CHAT AREA -->
        <div id="chatbox">
          <div class="message bot">
            Hi 👋 Click "Tell me a joke" to start!
          </div>
        </div>
    
        <!-- INPUT AREA -->
        <div class="input-bar">
          <button id="clickjokebutton">Tell me joke</button>
          <button id="copyBtn">Copy</button>
          <button id="favBtn">⭐</button>
        </div>
      </div>
    
      <!-- AUDIO -->
      <audio id="laugh-sound"
        src="https://www.soundjay.com/human/laugh-1.mp3"
        preload="auto"></audio>
    
      <script src="src/index.js"></script>
    
  </body>
</html>
