<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">

    <link href="src/style.css" rel="stylesheet" type="text/css" />


    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>

    

    <title>Are You Kidding Me</title>
    
  </head>

  <body>

    <div class="chat-app">

      <div class="top-bar">
        <h1>😂 Are you kidding me?</h1>
    
        <div class="controls">
          <label>
            <input type="checkbox" id="kidMode">
            Kid Mode
          </label>
    
          <button id="themeToggle">🌙</button>
          <button id="voiceToggle">🔊 Voice: ON</button>
        </div>
      </div>
    
        <!-- CHAT AREA -->
        <div id="chatbox">
          <div class="message bot">
            Hi 👋 Click "Tell me a joke" to start!
          </div>
        </div>
    
        <!-- INPUT AREA -->
        <div class="input-bar">
          <button id="clickjokebutton">Tell me a joke</button>
          <button id="copyBtn">Copy</button>
          <button id="favBtn">⭐</button>
          <button id="historyBtn">📜 History</button>
        </div>
    </div>

    <div id="historyModal" class="modal hidden">
      <div class="modal-content">
        <h3>Joke History</h3>
        <div id="historyList"></div>
        <button id="closeHistory">Close</button>
        <button id="clearHistory">Clear All</button>
      </div>
    </div>

      <!-- AUDIO -->
      <audio id="laugh-sound"
        src="https://www.soundjay.com/human/laugh-1.mp3"
        preload="auto"></audio>
    
      <script src="src/index.js"></script>
    
  </body>
</html>
